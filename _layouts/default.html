<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script defer src="{{ '/assets/js/script.js' | relative_url }}"></script>
</head>
<body>
  <div id="container">

    <nav id="sidebar">
      <button id="sidebar-toggle" aria-label="Toggle navigation">☰</button>
      {% include sidebar.html %}
    </nav>

    <main id="main">
      {{ content }}
    </main>

    <aside id="aside">
      <button id="aside-toggle" aria-label="Toggle info">≡</button>
      {% include aside.html %}
    </aside>

  </div>
</body>
</html>
