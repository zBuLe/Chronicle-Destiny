<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div id="left-panel" class="side-panel"> <!-- Left Panel -->
    <button class="toggle-btn" onclick="togglePanel('left-panel')">☰</button>
    <nav>
      <!-- Your nav links -->
      <a href="/">Home</a>
      <a href="/about/">About</a>
    </nav>
  </div>

  <main> <!-- Main Content -->
    {{ content }}
  </main>

  <div id="right-panel" class="side-panel"> <!-- Right Panel -->
    <button class="toggle-btn" onclick="togglePanel('right-panel')">☰</button>
    <div>
      <!-- Extra info, tools, or anything -->
      <p>Notes</p>
    </div>
  </div>

  <script>
    function togglePanel(id) {
      const panel = document.getElementById(id);
      panel.classList.toggle('open');
  
      if (id === 'left-panel') {
        document.body.classList.toggle('left-open');
      }
    }
  </script>
  
</body>
</html>
