<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Development site for Chronicle Destiny, a GameMaker-based narrative RPG.">
  <link rel="icon" href="{{ '/assets/img/favicon.ico' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/markdown.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/gml.css' | relative_url }}">
  <script src="https://kit.fontawesome.com/fe2b0ce82c.js" crossorigin="anonymous"></script>
</head>
<body>
  <header class="site-header">
    {% include header.html %}
  </header>
  <main>
    {{ content }}
  </main>
  <footer class="site-footer">
    {% include footer.html %}
  </footer>
  <script>
    document.querySelectorAll('div[class^="language-"]').forEach(function(codeBlock) {
        // Create the title bar div
        const headerDiv = document.createElement('div');
        headerDiv.className = 'code-header';
        
        // Special case for Java, label it as "GameMaker Language"
        let language = codeBlock.classList[0].replace('language-', '').toUpperCase();
        if (language === 'JAVA') {
            language = 'GameMaker Language'; // Special label for Java
        }
        
        headerDiv.textContent = language; // Use the adjusted language name
        
        // Insert it as the first child of the codeBlock div
        codeBlock.insertBefore(headerDiv, codeBlock.firstChild);
    });
</script>
</body>
</html>
